task: cd
dataset: xview2

data:
  root_dir: data/xview2
  img_size: 256

model:
  pretrained: aid_10k
  out_channels: 2
  freeze_unet: false

training:
  batch_size: 2
  num_epochs: 200
  lr: 1e-4
  grad_accumulation_steps: 2
  num_workers: 4
  val_period: 5
  change_weight: 3.0
  no_change_weight: 1.0

output:
  checkpoint_dir: checkpoints/xview2_cd

logging:
  write_to_wandb: false
  wandb_project: noise2map
  run_name: xview2_cd
