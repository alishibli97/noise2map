task: cd
dataset: spacenet7

data:
  root_dir: data/spacenet7
  img_size: 256
  min_val: 0.0
  max_val: 255.0

model:
  pretrained: aid_10k
  out_channels: 2
  freeze_unet: false

training:
  batch_size: 8
  num_epochs: 200
  lr: 1e-4
  grad_accumulation_steps: 2
  num_workers: 4
  val_period: 5
  change_weight: 3.0
  no_change_weight: 1.0

output:
  checkpoint_dir: checkpoints/spacenet7_cd

logging:
  write_to_wandb: false
  wandb_project: noise2map
  run_name: spacenet7_cd
